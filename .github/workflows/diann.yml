name: Build Apptainer Image
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Apptainer Native
        run: |
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Build SIF
        run: |
          # We use sudo here to ensure permissions are handled 
          # correctly during the build process
          sudo apptainer build diann.sif diann_dev.def

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: diann-sif
          path: diann.sif
          retention-days: 1
